- title: Hong Kong Game
  description: |
    Inspired by [The Game](https://www.imdb.com/title/tt0119174/) movie.
  prompt: |
    Produce a modern-day remake of the 1997 psychological thriller [The Game](https://www.imdb.com/title/tt0119174/) directed originally by David Fincher, reimagined for contemporary audiences while preserving the core DNA of the original — a meticulously constructed paranoia thriller where reality and artifice become indistinguishable, and a wealthy, emotionally isolated protagonist is systematically dismantled by an experience designed to save his life. The story retains the essential premise of a successful, controlling man who receives a mysterious "game" as a gift that begins to consume and dismantle every certainty in his life, but relocates the action entirely to Hong Kong and updates the technology, social dynamics, and psychological landscape for the late 2020s. All characters are English-speaking; the film is produced in English for global theatrical distribution. No smoking on screen — no characters smoke at any point in the film.

    Hong Kong is not merely a backdrop but a paranoia machine — a city of vertical density, compressed class contrast, and blurred public-private boundaries where the built environment itself feels unstable and pressurized. The protagonist inhabits the upper strata of Hong Kong's financial elite — the glass towers of Central and IFC, the private clubs of the Peak, the gated compounds of Repulse Bay — but the game drags him downward and inward through the city's layered architecture: the Mid-Levels escalators, the labyrinthine markets of Mong Kok, the neon canyons of Tsim Sha Tsui, the industrial decay of Kwun Tong, and the anonymous residential towers of Kowloon where millions live stacked in tight vertical grids. Hong Kong's dense surveillance infrastructure means the protagonist can never be unseen, and the city's compression means he can never truly escape. Every corridor, elevator, footbridge, and MTR platform becomes a potential stage for the game. The claustrophobia is architectural: in a city where private space barely exists and public space is always observed, the game has no boundaries. The production should exploit Hong Kong's cinematic DNA — the city that shaped Wong Kar-wai, Johnnie To, and decades of paranoid thriller filmmaking — while bringing a Western psychological horror sensibility to its visual language. Hong Kong's film infrastructure, experienced local crews, and the Hong Kong Film Development Fund incentives should be leveraged as part of the financing structure.

    This is a lean, location-driven production designed to be financeable in the current 2026 theatrical market. The production budget is HK$470 million (approximately US$60 million), covering development, principal photography, post-production, music, and above-the-line talent. The budget is deliberately scaled to avoid dependence on mainland China box office returns — critical given that the film's surveillance and paranoia themes may face censorship challenges for mainland release. P&A allocation is HK$195 million (approximately US$25 million), with a hybrid theatrical-plus-premium-VOD release strategy to de-risk revenue. The shoot is envisioned at approximately 45–55 shooting days, shot almost entirely on location in Hong Kong using local crews and infrastructure to maximize production value per dollar. Development and pre-production should begin within 3 months of greenlight, with principal photography targeted to start by month 7 and a finished film delivered for a festival premiere (Toronto, Busan, or Venice) approximately 18–20 months from greenlight, followed by targeted theatrical release within 4 weeks of the premiere and premium VOD within 60 days of theatrical.

    The director should be a Hong Kong or Asian filmmaker with a proven track record in thriller or noir — someone who understands the city's rhythms, architecture, and cinematic language innately and can sustain escalating tension across two hours. This is not a Western director parachuting into an exotic location; the city must feel lived-in, not toured. The lead requires a rising or mid-tier international star with strong recent credits and cultural relevance — not necessarily traditional Hollywood A-list, but someone with global recognition and the ability to carry the film, conveying control, vulnerability, rage, and transformation. A strong Hong Kong and Asian supporting cast is essential for authenticity and local audience engagement, including a magnetic antagonist-ally figure (the equivalent of the original's Sean Penn role) and a female lead whose allegiance remains genuinely ambiguous throughout. The screenplay needs a fresh adaptation that uses Hong Kong's architectural paranoia to heighten the stakes — when a man who controls billions from his Central district tower discovers the city itself has turned against him, every escalator, tunnel, and elevator becomes a threat. Contemporary technology — ubiquitous CCTV, Octopus card tracking, biometric access systems, encrypted communications, smart building networks — should serve as both tools of the game and sources of paranoia, without making the film about technology itself. The script must maintain the original's central question: is this liberation or destruction? Political themes must remain implicit and atmospheric rather than explicit — the paranoia is personal and existential, not overtly political, which protects both the creative vision and commercial viability across Asian markets.

    Music and score should establish an atmosphere of creeping unease beneath the city's relentless energy — a composer who can work with the sonic texture of Hong Kong itself: the hum of air conditioning units, the clatter of the MTR, the muffled density of a million lives stacked vertically, punctuated by silence, dissonance, and restraint rather than bombast. Post-production should allow 12–14 weeks for editing, VFX (subtle environmental and digital manipulation effects — nothing spectacle-driven), color grading, and sound design. Sound design is particularly critical — the game's intrusions into the protagonist's reality should be felt aurally before they are understood visually. The film should be finished in Dolby Vision and Dolby Atmos for premium theatrical formats.

    Key risks include differentiating the remake from the original's twist structure (audiences familiar with the 1997 film will anticipate the ending — the screenplay must find a way to subvert even informed expectations), securing IP rights from the original rights holders (Propaganda Films / PolyGram, now likely held by Universal or its subsidiaries), navigating Hong Kong's political and regulatory landscape regarding film content and permits, and managing logistics of filming in one of the world's most densely populated cities. Revenue strategy should not depend on mainland China theatrical release — treat it as upside, not baseline. The target audience is adults 25–54 drawn to smart, sophisticated genre fare. Success metrics: worldwide theatrical gross of HK$940 million–HK$1.7 billion (US$120–220 million), with a strong premium VOD and streaming licensing deal as a secondary revenue pillar. Festival launch (Toronto or Busan) is essential to build critical momentum and word-of-mouth before wide release. Pick a realistic, conservative scenario — not the most aggressive box-office projection. Banned words: metaverse, NFT, blockchain, deepfake, app, AR, VR.
  report_link: 20260310_hong_kong_game_report.html
  thumbnail: 20260310_hong_kong_game-thumbnail.jpg

- title: Parasomnia Research Unit
  description: |
    Have you ever been sleepwalking? [Parasomnia](https://en.wikipedia.org/wiki/Parasomnia) is a sleep disorder.
  prompt: |
    Establish a 3-year residential longitudinal research unit in Bonn, Germany, for the study of adult NREM parasomnias — sleepwalking, confusional arousals, and sleep terrors — with a secondary exploratory arm for REM sleep behavior disorder under a separate protocol with dedicated neurologic screening, reflecting RBD's distinct clinical trajectory per current AASM guidance. The facility is affiliated with University Hospital Bonn's Department of Epileptology, leveraging its existing long-term video-EEG monitoring culture, and addresses a specific methodological gap: traditional single-night polysomnography rarely captures infrequent parasomnia events, while outpatient actigraphy lacks physiological resolution. The unit houses 8 active sleep suites at launch in a converted residential property in a quiet Bonn neighborhood, renovated for safety (padded corridor edges, restricted-opening windows, silent exterior door alarms, fire safety, acoustic treatment, network cabling, accessibility modifications) while preserving a domestic feel — if the environment is too clinical, naturalistic behavior is suppressed. Physical capacity exists for 12 suites, but expansion is deferred until the pilot proves acceptable data quality, manageable false alarm rates, safe staffing ratios, and usable annotation throughput. Sensing uses a tiered acquisition model: nightly low-burden monitoring via dry-electrode EEG headbands, contact-free mattress sensors, unobtrusively mounted infrared cameras, ambient microphones, and environmental sensors; scheduled enhanced nights with fuller PSG montage including standard scalp EEG, EOG, chin EMG, and leg EMG on the first night, one mid-stay night, and the final night per participant; and escalation nights deploying full PSG after technician-flagged events to capture recurrence at clinical-grade resolution. All streams are time-synchronized and stored in EEG-BIDS-compatible format on a local NAS with nightly encrypted backup to university storage, annotated in real time by the night technician and later scored by two independent raters using AASM criteria with inter-rater reliability reported. Public data sharing is limited to de-identified physiological and sensor data under data use agreements — bedroom video carries severe privacy constraints and is not deposited in public repositories. The scientific program has three explicit aims: Aim 1, establish and operationally validate the residential capture model as safe, ethics-approved, and sustainable; Aim 2, characterize within-person and between-person parasomnia patterns longitudinally, including episode frequency, morphology, triggers, and temporal clustering; Aim 3, develop and benchmark semi-automated event-triage tools that rank probable parasomnia episodes and reduce manual review burden, evaluated against dual human scorer agreement rather than promising autonomous diagnosis.

    Participant recruitment targets adults aged 18–65 with NREM parasomnia confirmed through a structured pre-admission pathway: specialist clinical interview, collateral history from bed partner or household member where available, prior or screening polysomnography, and a structured exclusion checklist adjudicated by the PI. Explicit exclusions are nocturnal epilepsy or suspected epilepsy mimics, untreated obstructive sleep apnea, active major substance use disorder, severe psychiatric instability, and wandering or injury risk beyond facility capability. Recruitment channels are the University Hospital Bonn sleep clinic, regional neurologist referrals, and the Deutsche Gesellschaft für Schlafforschung und Schlafmedizin network, with per-night compensation of €80 plus meals. A matched control group provides baseline nocturnal movement, arousal patterns, and false-positive sensor activity under identical residential monitoring conditions, enabling benchmarking of the event-triage tools against normal nocturnal behavior. Event-yield planning assumes that based on the inclusion criterion of at least 2 self-reported episodes per month, approximately 70–80% of admitted participants will produce at least one captured and adjudicated event during a 2–8 week stay; stays may be extended up to 2 additional weeks for participants with zero captured events after the initial period, capped at 10 weeks total, with a protocol ceiling of 20% unproductive admissions before triggering a recruitment-criteria review. The core team is 9 people: a PI who is a board-certified sleep medicine physician, 2 postdoctoral researchers in sleep neurophysiology and computational neuroscience respectively, 3 research technicians rotating night shifts to ensure safe coverage of 8 active suites with adequate margin for event response and annotation, a clinical psychologist specializing in sleep disorders, a data engineer managing the sensor pipeline, and a study coordinator handling recruitment, consent, scheduling, and ethics compliance.

    Budget is €3.8 million over 3 years, gated: €1.8M year one covering property lease and renovation at approximately €750K, equipment at approximately €450K, staff hiring accounting for German social insurance contributions and actual overnight coverage, ethics approval, and a pilot cohort of 15–20 participants; €1.2M year two covering full operations with 30–35 participants, the enhanced-night PSG program, first publications, and event-triage algorithm development; €800K year three conditional on demonstrable progress by month 24. Personnel costs are approximately €2M over three years and remaining funds cover participant compensation, independent scoring time, data storage and retention, regulatory and legal work, and contingency. Funding sources are DFG research grant and University of Bonn internal research funding as the primary pillars, with a pharmaceutical industry partnership as optional upside rather than a feasibility requirement — if secured, the academic team retains full publication rights with the pharma partner receiving a 30-day pre-publication comment window only. Success criteria at 36 months: safe residential monitoring operations sustained for at least 24 months, enrollment of 50–70 NREM parasomnia participants plus matched controls, capture of a prespecified minimum number of independently adjudicated parasomnia events sufficient for Aim 2 phenotyping analysis, 2–3 peer-reviewed publications in sleep medicine journals covering methods validation and longitudinal characterization, a benchmarked semi-automated event-triage model with reported sensitivity, specificity, and agreement against dual human scoring, de-identified physiological dataset deposited in a recognized repository, and a submitted phase-two grant proposal for expansion and intervention studies. Failure triggers: if by month 18 the facility has enrolled fewer than 25 participants or captured fewer than 40 adjudicated events, the program undergoes external review. Governance is a 3-member external scientific advisory board reviewing progress every 6 months, with the PI holding operational authority and budget reallocations above €50K requiring board approval. Banned words: AI, blockchain, app, VR, AR, gamification, wearable startup, consumer product, DAO, NFT, metaverse, smart home, autonomous diagnosis, digital therapeutic, SaaS, marketplace, validated (in the context of claiming a mature deployable system). Pick a realistic scenario — this is an early-stage clinical research facility producing methods validation and phenotyping work, not a finished diagnostic platform.
  report_link: 20260311_parasomnia_research_unit_report.html
  thumbnail: 20260311_parasomnia_research_unit-thumbnail.jpg

- title: Sovereign Identity
  description: |
    The train has already left the station. [AltID](https://da.wikipedia.org/wiki/AltID) is only for iOS and Android, without Linux support planned.
  prompt: |
    Denmark's national digital identity infrastructure currently depends in practice on Apple iOS and Google Android for broad citizen access to essential services such as banking, tax filing, healthcare portals, and public administration. This dependency is not limited to app-store distribution. MitID's anti-fraud and app-integrity model relies on platform-controlled signals concerning approved installation channels and device integrity, which means that critical parts of the trust model for Danish digital identity are mediated by two foreign commercial platform providers. Even where direct observation of specific authentication events is not publicly documented, the current setup leaves Danish digital identity structurally dependent on platform vendors that control app availability, device trust signals, and surrounding telemetry environments. This creates not only a digital-sovereignty problem, but also a resilience and contingency problem: essential public access depends on a narrow supplier base and lacks a clearly platform-neutral fallback path.

    This matters because Denmark's public-sector digital strategy for 2026–2029 explicitly calls for reduced dependence on a small number of large foreign technology suppliers and for stronger digital sovereignty. The issue should therefore not be framed only as privacy or ideology, but as a concrete public-sector risk involving supplier concentration, reduced strategic autonomy, continuity-of-service exposure, and the absence of a robust fallback authentication path if platform policies, integrity APIs, distribution terms, or geopolitical conditions change.

    This project does not attempt to build and certify a production-ready replacement for MitID within the current trust framework. That would be unrealistic. The MitID ecosystem is conservative, certification-heavy, and tightly coupled to Apple/Google platform integrity signals. Instead, the project's objective is to establish the technical, regulatory, and political basis for formal platform-neutral access requirements and a certified fallback authentication path for Danish digital identity. The primary intervention point is not retrofitting MitID itself, but influencing AltID — Denmark's staged eIDAS2 wallet rollout — together with related procurement, standards, and continuity-planning decisions before the next identity stack hardens the same dependencies.

    The project is structured in three phases over 24 months with a total budget of 10.5 million DKK, gated across phases (3.0 million for phase one, 4.0 million for phase two, 3.5 million for phase three). The higher budget reflects the need for credible technical work, policy engagement, external review, institutional overhead, and contingency capacity. Do not assume that 8 million DKK is sufficient for the same scope.

    Phase one (months 1–8) is a feasibility, risk, and coalition-building phase. The technical work maps the relevant MitID dependency surface, especially platform integrity assumptions, app-distribution constraints, and the architectural conditions required for a platform-neutral or fallback trust model under eIDAS and NSIS at level "Substantial" or higher. The policy work reframes the issue in terms of resilience, continuity of service, procurement neutrality, and supplier concentration risk, while also addressing privacy and democratic accountability. In parallel, the advocacy work builds a coalition spanning civil-society organisations, privacy advocates, academic researchers, security experts, contingency-planning stakeholders, and sympathetic members of Folketinget's digital policy committee. The deliverables are: (1) a published feasibility and risk report, (2) a formal policy proposal to Digitaliseringsstyrelsen, (3) a fallback-authentication concept note oriented toward AltID and future procurement requirements, and (4) a permit/approval and stakeholder matrix with lead times, decision gates, and identified blockers. Phase one funding is unconditional.

    Phase two (months 9–16) develops non-production technical demonstrators. These are not certified MitID clients and do not attempt production integration with live MitID systems. The main demonstrator authenticates against a simulated Danish public-sector identity-provider environment using open standards such as FIDO2/WebAuthn and OpenID Connect on GrapheneOS or one comparable privacy-respecting Android-compatible platform. A secondary demonstrator explores a browser-based or hardware-token-based fallback authentication path that reduces dependence on the mobile OS duopoly altogether. The goal is not to prove immediate deployability, but to produce credible technical evidence that secure, standards-based, fallback-capable access models are feasible without exclusive reliance on Apple or Google as trust anchors. Keep the demonstrator scope lean and defensible; do not expand into feature-rich product development. Phase two funding is conditional on phase one producing a published feasibility report, at least one formal institutional engagement with Digitaliseringsstyrelsen, the MitID operator, or a related public-sector stakeholder, and a documented financing plan covering the remainder of the project.

    Phase three (months 17–24) focuses on procurement, standards, and continuity intervention around AltID and related digital identity planning. Using the feasibility report, demonstrators, and coalition built in earlier phases, the project seeks inclusion of requirements stating that Danish digital identity systems should not depend exclusively on Apple or Google app stores, platform integrity APIs, or proprietary push-notification infrastructure, and should include a platform-neutral or otherwise certified fallback access path for critical public authentication. The project also engages with relevant EU bodies and technical working groups connected to the European Digital Identity Wallet framework, with the aim of aligning Danish advocacy with broader European requirements on interoperability, portability, resilience, and reduced platform lock-in. The project's role is not to dictate architecture directly, but to create technical evidence, procurement language, and standards pressure that make supplier-neutral and fallback-capable design harder to exclude. If formal traction with AltID is weak by month 16, phase three should de-scope toward publication, coalition consolidation, and EU-facing standards input rather than pretending Danish procurement influence has been secured.

    The project team should include a lead researcher in mobile security and authentication protocols, a regulatory and compliance specialist familiar with Danish and EU digital identity frameworks (including eIDAS and NSIS), a policy and public-affairs coordinator experienced in Danish digital governance and procurement processes, a technical lead for the demonstrator work, and at least one additional engineer or contractor covering web authentication, hardware-token workflows, or Linux/GrapheneOS-related implementation. The technical staffing should avoid dependence on a single specialist. Assume the project's primary physical base is in Copenhagen, Denmark, at a Danish university, independent research institution, or security-qualified R&D facility providing access-controlled workspace appropriate for security-sensitive digital identity research, development, and stakeholder meetings. Budget for institutional overhead, external security review, and limited legal/procurement support explicitly rather than treating them as absorbed costs.

    Success criteria: by month 24, the project has produced a published feasibility and risk report on platform-neutral and fallback-capable Danish digital identity; delivered two working non-production demonstrators (one mobile-oriented, one browser-based or hardware-token-based fallback); secured a formal written response from Digitaliseringsstyrelsen or another relevant authority to the project's proposal; and achieved inclusion of platform-neutrality, fallback access, continuity, resilience, or supplier-concentration language in at least one official AltID-related design, policy, consultation, or procurement document. A stretch goal is that the project's EU-level engagement contributes to language in relevant European Digital Identity Wallet materials that supports platform-neutral access or certified fallback mechanisms. Do not use consumer adoption rates as a primary KPI for this project, because it is not shipping a production identity product.

    Pick a realistic scenario that accounts for institutional inertia, regulatory friction, incumbent resistance, financing uncertainty, and the likelihood that convenience arguments will be used against platform-neutral alternatives. Do not assume constructive cooperation from existing operators. The primary lever is not technical disruption for its own sake, but the combination of resilience framing, procurement intervention, standards pressure, and credible technical demonstration.
